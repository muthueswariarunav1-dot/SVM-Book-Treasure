<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
        height:100px;
        width:100px;
        background-color:lightblue;
        position: relative;
        animation-name:box;
        animation-duration: 10s;
        animation-delay:3s;}
        @keyframes box{
0%{left:0px;top:0px;}
5%{left: 50px; top:0px;}
10%{left:50px;top:50px;}
15%{left:100px;top: 50px;}
20%{left:100px;top:0px;}
25%{left:150px;top:0px;}
30%{left:150px; top:50px;}
35%{left:200px; top:50px;}
40%{left: 200px; top:0px;}
45%{left:250px; top:0px;}
50%{left:250px; top:50px;}
55%{left:300px; top:50px;}
60%{left:300px; top:0px;}
65%{left:350px; top:0px;}
70%{left:350px; top:50px;}
75%{left:400px; top:50px;}
80%{left:400px; top:0px;}
85%{left:450px; top:0px;}
90%{left:450px; top:50px;}
95%{left:500px; top:50px;}
100%{left:500px; top:0px;}}
    </style>
</head>
<body>
    <h1>chair</h1>
    <img src="chair4.png" width="1400" height="900">
    <div></div>
</body>
</html>
